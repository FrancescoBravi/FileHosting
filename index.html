<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>FileHosting – Lista automatica file</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 30px auto; }
    h1 { font-size: 24px; }
    ul { line-height: 1.8; }
    code { background: #f4f4f4; padding: 2px 4px; border-radius: 3px; }
  </style>
</head>
<body>

  <h1>File presenti nella cartella /docs</h1>
  <p>Questa lista viene generata automaticamente leggendo la cartella del repository.</p>

  <ul id="file-list">
    <li><em>Caricamento...</em></li>
  </ul>

  <script>
    const username = "FrancescoBravi";
    const repo = "FileHosting";
    const branch = "main";
    const folder = "docs";

    const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folder}?ref=${branch}`;
    const pagesBase = `https://${username}.github.io/${repo}/`;

    fetch(apiUrl)
      .then(response => response.json())
      .then(files => {
        const list = document.getElementById("file-list");
        list.innerHTML = "";

        files.forEach(file => {
          if (file.type === "file") {
            const li = document.createElement("li");
            const link = document.createElement("a");

            // Link diretto via GitHub Pages
            link.href = pagesBase + folder + "/" + encodeURIComponent(file.name);
            link.textContent = file.name;
            link.target = "_blank";

            li.appendChild(link);
            list.appendChild(li);
          }
        });
      })
      .catch(err => {
        document.getElementById("file-list").innerHTML =
          "<li>Errore nel caricamento dei file.</li>";
      });
  </script>

</body>
</html>
